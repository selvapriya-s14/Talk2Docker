<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Talk2Docker Chat</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; }
        #chat-container { width: 500px; margin: 50px auto; background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);}
        #chat-box { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #fafafa;}
        .message { margin: 5px 0; }
        .user { color: #333; font-weight: bold; }
        .bot { color: #007bff; }
        #user-input { width: 80%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        #send-btn { padding: 10px 15px; border: none; background: #007bff; color: #fff; border-radius: 5px; cursor: pointer; }
        #send-btn:hover { background: #0056b3; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2>Talk2Docker Chat</h2>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="Type your message...">
    <button id="send-btn">Send</button>
</div>

<script>
const chatBox = document.getElementById("chat-box");
const userInput = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");

// Function to add message to chat
function addMessage(text, sender) {
    const msgDiv = document.createElement("div");
    msgDiv.classList.add("message");
    msgDiv.classList.add(sender);
    msgDiv.textContent = (sender === "user" ? "You: " : "Bot: ") + text;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Function to send message to backend
function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage(text, "user");  // show user message
    userInput.value = "";      // clear input

    fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
    })
    .then(res => res.json())
    .then(data => {
        let botMessage = "";

        // Check if Docker command response
        if(data.status === "success") {

            if(data.images) {
                botMessage += "Images:\n" + data.images.flat().join("\n") + "\n";
            }
            if(data.containers) {
                botMessage += "Containers:\n" + data.containers.map(c => `${c.name} (${c.id})`).join("\n") + "\n";
            }
            if(data.logs) {
                botMessage += "Logs:\n" + data.logs + "\n";
            }
            if(data.message) {
                botMessage += data.message + "\n";
            }

            // Show raw JSON as well
            botMessage += "\nRaw response:\n" + JSON.stringify(data, null, 2);

        } else {
            // AI chat or error
            botMessage = data.response || data.message || JSON.stringify(data);
        }

        addMessage(botMessage, "bot");
    })
    .catch(err => addMessage("Error: " + err, "bot"));
}

// Send button click
sendBtn.addEventListener("click", sendMessage);

// Enter key press
userInput.addEventListener("keypress", function(e){
    if(e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
